name: Scan Exposed Codex API Keys

on:
  schedule:
    - cron: '*/10 * * * *'  # Run every 10 minutes (6x per hour for rate limit efficiency)
  workflow_dispatch:  # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scanner.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md data/
          git diff --staged --quiet || (git commit -m "docs: Update exposed keys report [$(date -u '+%Y-%m-%d_%H:%M UTC')]" && git push)
